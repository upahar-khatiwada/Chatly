name: Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        run: |
          docker build -t upahar/chatly-backend:0.0.1 -t upahar/chatly-backend:latest ./backend
          docker push upahar/chatly-backend:0.0.1
          docker push upahar/chatly-backend:latest

      - name: Build and Push Frontend Image
        run: |
          docker build -t upahar/chatly-frontend:0.0.1 -t upahar/chatly-frontend:latest ./frontend
          docker push upahar/chatly-frontend:0.0.1
          docker push upahar/chatly-frontend:latest

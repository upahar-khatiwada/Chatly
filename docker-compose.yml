name: chatly

services:
  backend:
    image: upahar/chatly-backend:0.0.1
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatly-backend
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    networks:
      - chatly-network
  frontend:
    image: upahar/chatly-frontend:0.0.1
    ports:
      - "4000:4000"
    env_file:
      - ./frontend/.env
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatly-frontend
    networks:
      - chatly-network
  mongodb:
    image: mongo:7.0-jammy
    container_name: chatly-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - chatly-network

volumes:
  mongo-data:
    driver: local
  
networks:
  chatly-network:
    driver: bridge